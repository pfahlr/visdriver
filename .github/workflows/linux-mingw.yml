name: Build on Linux

permissions:
  contents: read

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  linux-mingw:
    runs-on: ubuntu-24.04
    env:
      APT_CACHE_DIR: .apt-cache   # workspace-relative cache dir

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      # Ensure cache dirs exist even if restore finds nothing
      - name: Precreate cache dirs
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/${APT_CACHE_DIR}/partial"
          mkdir -p "${HOME}/.cache/cmake"

      - name: Restore APT archive cache
        uses: actions/cache@v4
        with:
          path: .apt-cache
          key: ubuntu-24.04-apt-archives-${{ hashFiles('.ci/ubuntu-packages.txt') }}
          restore-keys: |
            ubuntu-24.04-apt-archives-
            apt-archives-

      - name: Prepare APT cache dir
        run: |
          set -euo pipefail
          # Ensure perms are sane (important on first run)
          chmod -R u+rwX "${GITHUB_WORKSPACE}/${APT_CACHE_DIR}"

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          packages="$(grep -vE '^\s*(#|$)' .ci/ubuntu-packages.txt || true)"
          if [[ -n "${packages}" ]]; then
            sudo dpkg --add-architecture i386; \
            sudo apt-get -o dir::cache::archives="${GITHUB_WORKSPACE}/${APT_CACHE_DIR}" \
              install --yes --no-install-recommends -V ${packages}
          else
            echo "No packages listed in .ci/ubuntu-packages.txt"
          fi

      - name: Restore CMake downloads cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/cmake
          key: ubuntu-24.04-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            ubuntu-24.04-cmake-
            cmake-

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.19
        with:
          key: linux-mingw-${{ hashFiles('cmake/mingw-toolchain.cmake', 'CMakeLists.txt', 'cmake/**/*.cmake', 'src/**') }}
          max-size: 750M

      - name: Configure
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -S . \
            -B build

      - name: Build
        run: |
          make -C build -j"$(nproc)" VERBOSE=1

      - name: Prepare build artifacts for upload
        run: |
          set -x
          mkdir "visdriver_win32bin_mingw_${{ github.sha }}"
          cp -v \
            COPYING \
            README.md \
            /usr/i686-w64-mingw32/lib/libwinpthread-1.dll \
            /usr/lib/gcc/i686-w64-mingw32/*-posix/libgcc_s_dw2-1.dll \
            /usr/lib/gcc/i686-w64-mingw32/*-posix/libstdc++-6.dll \
            build/visdriver.exe \
            "visdriver_win32bin_mingw_${{ github.sha }}"/

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: "visdriver_win32bin_mingw_${{ github.sha }}"
          path: "visdriver_win32bin_mingw_${{ github.sha }}/"
          if-no-files-found: error

      # ---- Post-job cleanup / sanitize steps ----
      - name: Sanitize APT cache for saving
        if: always()
        run: |
          set -euo pipefail
          rm -f "${GITHUB_WORKSPACE}/${APT_CACHE_DIR}/lock" || true
          rm -f "${GITHUB_WORKSPACE}/${APT_CACHE_DIR}/partial/lock" || true
          sudo chown -R "$USER":"$USER" "${GITHUB_WORKSPACE}/${APT_CACHE_DIR}"
          chmod -R u+rwX "${GITHUB_WORKSPACE}/${APT_CACHE_DIR}"

      - name: Sanitize CMake cache for saving
        if: always()
        run: |
          mkdir -p "${HOME}/.cache/cmake"
