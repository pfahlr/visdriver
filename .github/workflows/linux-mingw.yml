name: Build on Linux

permissions:
  contents: read

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  linux-mingw:
    runs-on: ubuntu-24.04
    env:
      APT_CACHE_DIR: .apt-cache   # <- use a relative path inside the workspace
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Restore APT archive cache
        uses: actions/cache@v4
        with:
          path: .apt-cache                               # <- matches env above
          key: ${{ runner.os }}-${{ runner.image }}-apt-archives-${{ hashFiles('.ci/ubuntu-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.image }}-apt-archives-
            ${{ runner.os }}-apt-archives-

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get -o dir::cache::archives="${GITHUB_WORKSPACE}/${APT_CACHE_DIR}" \
            install --yes --no-install-recommends -V \
            $(grep -vE '^\s*#' .ci/ubuntu-packages.txt | xargs)

      # (optional) Cache CMake downloads too
      - name: Cache CMake downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/cmake
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      # Set up and cache ccache (works for i686-w64-mingw32-* compilers too)
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.19
        with:
          # Key on OS, toolchain file (compiler choice), and build graph
          key: ${{ runner.os }}-mingw-${{ hashFiles('cmake/mingw-toolchain.cmake', 'CMakeLists.txt', 'cmake/**/*.cmake') }}
          max-size: 750M

      - name: Configure
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -S . \
            -B build

      - name: Make
        run: |
          make -C build -j"$(nproc)" VERBOSE=1

      - name: Prepare build artifacts for upload
        run: |
          set -x
          mkdir "visdriver_win32bin_mingw_${{ github.sha }}"
          cp -v \
            COPYING \
            README.md \
            /usr/i686-w64-mingw32/lib/libwinpthread-1.dll \
            /usr/lib/gcc/i686-w64-mingw32/*-posix/libgcc_s_dw2-1.dll \
            /usr/lib/gcc/i686-w64-mingw32/*-posix/libstdc++-6.dll \
            build/visdriver.exe \
            "visdriver_win32bin_mingw_${{ github.sha }}"/

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: "visdriver_win32bin_mingw_${{ github.sha }}"
          path: "visdriver_win32bin_mingw_${{ github.sha }}/"
          if-no-files-found: error
